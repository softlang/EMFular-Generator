<h2 mat-dialog-title>
  Multiple Packages Detected
</h2>

<mat-dialog-content>
  <p>
    EMFular found several packages. Please choose one.
  </p>

  <mat-radio-group [(ngModel)]="selected">
    @for (cls of candidates; track cls.name) {
      <mat-radio-button
        [value]="cls"
        class="root-option"
      >
        <strong>{{ cls.name }}</strong>

        <div class="meta">


        </div>
      </mat-radio-button>
    }
  </mat-radio-group>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" [disabled]="!selected" (click)="confirm()">
    Use Selected Root
  </button>
</mat-dialog-actions>
